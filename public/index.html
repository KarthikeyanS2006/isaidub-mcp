<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Keyan - Tamil & Tamil Dubbed Movies</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-text">Sri Keyan</div>
        <div class="splash-spinner"></div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo" id="navLogo">
                <span class="logo-s">S</span>
                <span class="logo-ri">ri</span>
                <span class="logo-k">K</span>
                <span class="logo-eyan">eyan</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active" id="homeLink">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    Home
                </a>
                <a href="#" class="nav-link" id="myListLink">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/>
                    </svg>
                    My List
                    <span class="badge-count" id="myListCount">0</span>
                </a>
            </div>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="reduceMotionBtn" title="Reduce Motion">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm0-2h2V7h-2z"/>
                </svg>
            </button>
            <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" id="themeIcon">
                    <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                </svg>
            </button>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="search-container" id="searchContainer">
                <input type="text" id="searchInput" placeholder="Search movies...">
                <button id="searchBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="#" class="mobile-nav-link active" id="mobileHomeLink">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            Home
        </a>
        <a href="#" class="mobile-nav-link" id="mobileMyListLink">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/>
            </svg>
            My List
            <span class="badge-count" id="mobileMyListCount">0</span>
        </a>
        
        <div class="mobile-section-title">Content Type</div>
        <div class="mobile-type-tabs">
            <button class="mobile-tab active" data-type="all">All</button>
            <button class="mobile-tab" data-type="movies">Movies</button>
            <button class="mobile-tab" data-type="webseries">Web Series</button>
        </div>
        
        <div class="mobile-section-title">Source</div>
        <div class="mobile-source-tabs">
            <button class="mobile-tab active" data-source="moviesda">Tamil Movies</button>
            <button class="mobile-tab" data-source="isaidub">Tamil Dubbed</button>
        </div>
        
        <div class="mobile-section-title">Year</div>
        <div class="mobile-year-tabs">
            <button class="mobile-tab active" data-year="2026">2026</button>
            <button class="mobile-tab" data-year="2025">2025</button>
            <button class="mobile-tab" data-year="2024">2024</button>
            <button class="mobile-tab" data-year="2023">2023</button>
            <button class="mobile-tab" data-year="2022">2022</button>
        </div>
        
        <div class="mobile-search">
            <input type="text" id="mobileSearchInput" placeholder="Search movies...">
        </div>
        
        <button class="icon-btn mobile-motion-btn" id="mobileReduceMotionBtn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm0-2h2V7h-2z"/>
            </svg>
            Reduce Motion
        </button>
    </div>

    <main>
        <section class="hero-section" id="heroSection">
            <div class="hero-backdrop" id="heroBackdrop"></div>
            <div class="hero-gradient"></div>
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle"></h1>
                <p class="hero-description" id="heroDescription"></p>
                <div class="hero-buttons">
                    <button class="btn-play" id="playTrailerBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        Play Trailer
                    </button>
                    <button class="btn-info" id="moreInfoBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                        </svg>
                        More Info
                    </button>
                </div>
            </div>
            <div class="hero-slider-controls">
                <button class="slider-prev" id="sliderPrev">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </button>
                <button class="slider-next" id="sliderNext">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
            <div class="hero-indicators" id="heroIndicators"></div>
        </section>

        <div id="loading" class="loading-overlay" style="display: none;">
            <div class="loader"></div>
        </div>

        <!-- Source & Media Type Tabs -->
        <div class="tabs-container">
            <div class="type-tabs">
                <button class="type-tab active" data-type="all">All</button>
                <button class="type-tab" data-type="movies">Movies</button>
                <button class="type-tab" data-type="webseries">Web Series</button>
            </div>
            <div class="source-tabs">
                <button class="source-tab active" data-source="moviesda">
                    <span class="status-dot" id="moviesda-status"></span>
                    Tamil Movies
                </button>
                <button class="source-tab" data-source="isaidub">
                    <span class="status-dot offline" id="isaidub-status"></span>
                    Tamil Dubbed
                </button>
            </div>
            <div class="category-tabs">
                <button class="cat-tab active" data-category="2026">2026</button>
                <button class="cat-tab" data-category="2025">2025</button>
                <button class="cat-tab" data-category="2024">2024</button>
                <button class="cat-tab" data-category="2023">2023</button>
                <button class="cat-tab" data-category="2022">2022</button>
            </div>
        </div>

        <!-- My List Section (Hidden by default) -->
        <section class="movies-section" id="myListSection" style="display: none;">
            <div class="movies-row">
                <div class="row-header">
                    <h2 class="row-title">My List</h2>
                    <span class="row-count" id="myListRowCount">0 movies</span>
                </div>
                <div class="movies-slider">
                    <div class="movie-grid" id="myListGrid"></div>
                </div>
            </div>
        </section>

        <!-- Search Suggestions -->
        <div class="search-suggestions" id="searchSuggestions" style="display: none;">
            <p class="suggestion-text">Try saying:</p>
            <div class="suggestion-chips">
                <button class="chip" data-query="funny movies">"Something funny"</button>
                <button class="chip" data-query="action movies">"Action movies"</button>
                <button class="chip" data-query="horror movies">"Scary movies"</button>
                <button class="chip" data-query="short movies">"Short movies"</button>
            </div>
        </div>

        <section class="movies-section" id="moviesSection">
            <!-- Movie rows will be added dynamically -->
        </section>
    </main>

    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-content">
            <button class="preview-close" id="previewClose">&times;</button>
            <div class="preview-video" id="previewVideo">
                <div class="preview-placeholder">
                    <svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <p>Click to Preview</p>
                </div>
            </div>
            <div class="preview-info">
                <h3 id="previewTitle"></h3>
                <p id="previewDesc"></p>
                <div class="preview-actions">
                    <button class="btn-play-small" id="previewPlay">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        Play
                    </button>
                    <button class="btn-add-list" id="previewAddList">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        My List
                    </button>
                    <button class="btn-thumb" id="previewThumb">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="modal-gradient"></div>
            <div class="modal-body">
                <div class="modal-left">
                    <h2 id="modalTitle" class="modal-title"></h2>
                    <div class="modal-meta">
                        <span id="modalQuality" class="badge"></span>
                        <span id="modalRating" class="rating"></span>
                        <span id="modalLanguage" class="badge"></span>
                    </div>
                    <p id="modalSynopsis" class="modal-synopsis"></p>
                    <div class="modal-details">
                        <p id="modalDirector"></p>
                        <p id="modalStarring"></p>
                    </div>
                    <div class="modal-trailer-btn">
                        <button class="btn-play-small" id="modalPlayTrailer">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                            Watch Trailer
                        </button>
                    </div>
                </div>
                <div class="modal-right">
                    <div id="modalPoster" class="modal-poster"></div>
                </div>
            </div>
            <div class="modal-download">
                <h3>Download Options</h3>
                <div id="qualityOptions" class="quality-options"></div>
                <div id="fileInfo" class="file-info" style="display: none;"></div>
                <div id="downloadLinks" class="download-links"></div>
                <div id="loadingLinks" class="loading-links" style="display: none;">
                    <div class="loader-small"></div>
                    <div class="download-progress">
                        <div class="progress-bar-container">
                            <div class="progress-bar">
                                <div class="progress-bar-fill" id="progressFill"></div>
                            </div>
                            <span class="progress-text" id="progressText">0%</span>
                        </div>
                        <div class="progress-status" id="progressStatus">Fetching download links...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="trailerModal" class="trailer-modal">
        <button class="trailer-close" id="trailerClose">&times;</button>
        <div class="trailer-container">
            <iframe id="trailerFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <span class="logo-s">S</span><span class="logo-ri">ri</span><span class="logo-k">K</span><span class="logo-eyan">eyan</span>
            </div>
            <p class="footer-tagline">Tamil & Tamil Dubbed Movies - Direct Download</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">DMCA</a>
            </div>
            <p class="copyright">&copy; 2026 Sri Keyan. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
