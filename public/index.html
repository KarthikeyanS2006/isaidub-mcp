<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAIDUB - Tamil Dubbed Movies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ISAIDUB</h1>
            <p>Tamil Dubbed Movies - Direct Download</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for movies...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-category="latest">Latest Movies</button>
            <button class="tab" data-category="2026">2026 Dubbed</button>
            <button class="tab" data-category="2025">2025 Dubbed</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <div id="movieGrid" class="movie-grid"></div>

        <div id="movieModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-body">
                    <div class="modal-poster">
                        <img id="modalPoster" src="" alt="">
                    </div>
                    <div class="modal-info">
                        <h2 id="modalTitle">Movie Title</h2>
                        <p id="modalGenres" class="modal-genres"></p>
                        <p id="modalDirector" class="modal-meta"></p>
                        <p id="modalStarring" class="modal-meta"></p>
                        <p id="modalQuality" class="modal-meta"></p>
                        <p id="modalLanguage" class="modal-meta"></p>
                        <p id="modalSynopsis" class="modal-synopsis"></p>
                        <div id="loadingDetails" class="loading" style="display: none;">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-download">
                    <h3>Select Quality</h3>
                    <div id="qualityOptions" class="quality-options">
                        <button class="quality-btn" data-quality="480p">480p</button>
                        <button class="quality-btn selected" data-quality="720p">720p</button>
                        <button class="quality-btn" data-quality="1080p">1080p</button>
                    </div>
                    <div id="downloadLinks" class="download-links"></div>
                    <div id="loadingLinks" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>Fetching download links...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="brand">Sri Keyan</div>
        <p>Tamil Dubbed Movies Download</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
